<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Art</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/generate" class="active">Generate Art</a></li>
                <li><a href="/gallery">Gallery</a></li>
                <li><a href="/profile">Profile</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1 class="mt-5">Generate Art</h1>
            <form id="generate-form">
                <div class="mb-3">
                    <label for="prompt" class="form-label">Enter your art prompt:</label>
                    <input type="text" class="form-control" id="prompt" name="prompt" required>
                </div>
                <button type="submit" class="btn btn-primary">Generate</button>
            </form>
            <div id="art-result" class="mt-5"></div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2023 AI-Powered Art Generator</p>
        </div>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
