<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/generate">Generate Art</a></li>
                <li><a href="/gallery" class="active">Gallery</a></li>
                <li><a href="/profile">Profile</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1 class="mt-5">Art Gallery</h1>
            <div class="row">
                {% for art in art_pieces %}
                <div class="col-md-4">
                    <div class="card mb-4">
                        <img src="data:image/png;base64,{{ art.image_data }}" class="card-img-top" alt="{{ art.title }}">
                        <div class="card-body">
                            <h5 class="card-title">{{ art.title }}</h5>
                            <p class="card-text">Created at: {{ art.created_at }}</p>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2023 AI-Powered Art Generator</p>
        </div>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
